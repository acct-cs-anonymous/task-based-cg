# Training configuration
# Location to store checkpoints
seed: 0
pretrained: False
prompt_length: 'fixed'  # 'fixed' or 'variable'
n_alphabets: 26        # Total number of tokens "a-z" + " "
seq_len: 6              # Length of tokens in data prompt
n_functions: 6  # Number of maximum functions per composition

device : "cuda"
bf16: False
epochs: 200

data:
  num_workers: 4
  batch_size: 512

net:
  compile: False
  vocab_size: 512
  prompt_length: "fixed"
  context_size: 50
  n_layer: 3
  n_head: 6
  n_embd: 120
  dropout: 0.0
  bias: False
  mlp: True

optimizer:
  learning_rate: 0.0003
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0

  decay_lr: True
  warmup_iters: 200
  min_lr: 0.000006

log: 
  eval_interval: 500
  log_interval: 50
